            document.title = bike.name + " — IronHeaven";
            const detailHero = document.getElementById("detail-hero");
            detailHero.style.background = `linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url("${bike.heroImage}")`;

            detailHero.style.backgroundSize = "cover";
            detailHero.style.backgroundRepeat = "no-repeat";

            document.getElementById("detail-tagline").textContent = bike.tagline;
            document.getElementById("detail-price").textContent = bike.price;
            document.getElementById("detail-description").textContent = bike.description;

            bike.specs.forEach(([label, value]) => {
                const row = document.createElement("tr");
                row.innerHTML = `<td class="spec-label">${label}</td><td class="spec-value">${value}</td>`;

            bike.related.forEach(id => {

                <div class="bike-info">
